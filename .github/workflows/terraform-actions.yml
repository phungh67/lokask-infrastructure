name: terraform-deploymment-workflows
run-name: terraform continuous integration
on: [push]

jobs:
    check-bash-version:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v4
              with:
                node-version: '20'
            - run: npm install -g bat
            - run: bats -v