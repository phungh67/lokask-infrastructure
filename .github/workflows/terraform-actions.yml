name: terraform-deploymment-workflows
run-name: terraform continuous integration
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# temp fix the deployment region here
# @TODO change to env variable
env:
    AWS_REGION: "us-east-1"

jobs:
  assume-aws-role:
    runs-on: ubuntu-latest

    # take the env first
    environment: dev

    # permissions with env
    permissions:
        id-token: write
        contents: read
    steps:
      - name: git clone the repository
        uses: actions/checkout@v4
      # additional for easy tracking
      - name: set timestamp
        id: timestamp_generator
        run: |
            SUFFIX=$(date +'%d%m%H')
            echo "session_id=github_action_terraform_$SUFFIX" >> $GITHUB_OUTPUT
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-sesssion-name: ${{ steps.timestamp_generator.outputs.session_id }}
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity